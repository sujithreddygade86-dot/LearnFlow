<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnFlow</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                <h1>Learn<span>Flow</span></h1>
                <div class="line"></div>
                <p>Learn continuously • Grow confidently</p>
            </div>

            <ul>
                <li><a href="admin.html" class="active">Manage</a></li>
                <li><a href="createcourse.html" >Create</a></li>
                <li><a href="Assignments.html">Assignments</a></li>
                <li><a href="students.html">Students</a></li>
            </ul>

            <div class="search">
                <input type="text" placeholder="Search Courses">
            </div>

            <div class="actions" id="actions">
                <a href="login.html" class="login">Login</a>
            </div>

        </nav>
    </header>

    
    <div id ="container1"></div>

    <div class="overlay" id="overlay">

    <div class="editBox">

        <span class="close" onclick="closePopup()">&times;</span>

        <h1>Edit Course</h1>

        <div class="input-group">
            <label>Course ID</label>
            <input type="number" id="id">
        </div>

        <div class="input-group">
            <label>Course Title</label>
            <input type="text" id="title">
        </div>

        <div class="input-group">
            <label>Category</label>
            <input type="text" id="category">
        </div>

        <div class="input-group">
            <label>Level</label>

            <select id="level">
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
            </select>
        </div>

        <div class="input-group">
            <label>Duration</label>
            <input type="text" id="duration">
        </div>

        <div class="input-group">
            <label>Lessons</label>
            <input type="number" id="lessons">
        </div>

        <div class="input-group">
            <label>Students</label>
            <input type="text" id="students">
        </div>

        <div class="input-group">
            <label>Rating</label>
            <input type="number" step="0.1" id="rating">
        </div>

        <div class="input-group">
            <label>Image URL</label>
            <input type="text" id="image">
        </div>

        <div class="input-group">
            <label>Description</label>
            <textarea id="description" rows="4"></textarea>
        </div>

        <hr>

        <h2>Course Videos</h2>

        <div id="videoList"></div>

        <br>

        <div class="input-group">
            <label>Video Title</label>
            <input type="text" id="videoTitle">
        </div>

        <div class="input-group">
            <label>Video Path</label>
            <input type="text" id="videoPath">
        </div>

        <button onclick="addVideo()">
            Add Video
        </button>

        <br><br>

        <button onclick="updateCourse()">
            Update Course
        </button>

    </div>

</div>

    <script src="admin.js"></script>

</body>

</html>

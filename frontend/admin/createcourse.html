<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnFlow</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="createcourse.css">
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                <h1>Learn<span>Flow</span></h1>
                <div class="line"></div>
                <p>Learn continuously • Grow confidently</p>
            </div>

            <ul>

                <li><a href="admin.html">Manage</a></li>
                <li><a href="createcourse.html" class="active">Create</a></li>
                <li><a href="Assignments.html">Assignments</a></li>
                <li><a href="students.html">Students</a></li>
            </ul>

            <div class="search">
                <input type="text" placeholder="Search Courses">
            </div>

            <div class="actions" id="actions">
                <a href="login.html" class="login">Login</a>
            </div>

        </nav>
    </header>

    <br><br><br>

    <div class="container1">

        <h1>Create New Course</h1>
        <p>Enter course details below. Videos can be added after creating the course.</p>

        <form id="courseForm">

            <div class="input-group">
                <label>Course ID</label>
                <input type="number" id="id" placeholder="Enter Course ID">
            </div>

            <div class="input-group">
                <label>Course Title</label>
                <input type="text" id="title" placeholder="Enter Course Title">
            </div>

            <div class="input-group">
                <label>Category</label>
                <input type="text" id="category" placeholder="Enter Category">
            </div>

            <div class="input-group">
                <label>Level</label>
                <select id="level">
                    <option value="">Select Level</option>
                    <option>Beginner</option>
                    <option>Intermediate</option>
                    <option>Advanced</option>
                </select>
            </div>

            <div class="input-group">
                <label>Duration</label>
                <input type="text" id="duration" placeholder="Eg : 40 Hours">
            </div>

            <div class="input-group">
                <label>Total Lessons</label>
                <input type="number" id="lessons" placeholder="Eg : 100">
            </div>

            <div class="input-group">
                <label>Students Enrolled</label>
                <input type="text" id="students" placeholder="Eg : 5.2K">
            </div>

            <div class="input-group">
                <label>Course Rating</label>
                <input type="number" step="0.1" id="rating" placeholder="Eg : 4.8">
            </div>

            <div class="input-group">
                <label>Course Image URL</label>
                <input type="text" id="image" placeholder="Paste Image URL">
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea id="description" rows="5" placeholder="Enter Course Description"></textarea>
            </div>
            <br>
            <hr>
            <br>

            <h2>Course Videos</h2>

            <div class="input-group">
                <label>Video Title</label>
                <input type="text" id="videoTitle" placeholder="Enter Video Title">
            </div>

            <div class="input-group">
                <label>Video Path</label>
                <input type="text" id="videoPath" placeholder="videos/black.mp4">
            </div>

            <button type="button" onclick="addVideo()">
                Add More
            </button>

            <br><br>

            <div id="videoList"></div>

            <br>

            <button type="button" onclick="saveCourse()">
                Create Course
            </button>

        </form>

    </div>







    <script src="createcourse.js"></script>

</body>

</html>

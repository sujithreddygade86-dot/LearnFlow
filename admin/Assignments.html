<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Assignments</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="Assignments.css">
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                <h1>Learn<span>Flow</span></h1>
                <div class="line"></div>
                <p>Learn continuously • Grow confidently</p>
            </div>

            <ul>

                <li><a href="admin.html">Manage</a></li>
                <li><a href="createcourse.html">Create</a></li>
                <li><a href="Assignments.html" class="active">Assignments</a></li>
                <li><a href="students.html">Students</a></li>
            </ul>

            <div class="search">
                <input type="text" placeholder="Search Courses">
            </div>

            <div class="actions" id="actions">
                <a href="login.html" class="login">Login</a>
            </div>

        </nav>
    </header>


    <br><br>

    <div class="container1">

        <h1>Create Assignment</h1>

        <div class="input-group">
            <label>Select Course</label>
            <select id="course">
                <option value="">Select Course</option>
            </select>
        </div>

        <div class="input-group">
            <label>Assignment Title</label>
            <input type="text" id="title" placeholder="Enter Assignment Title">
        </div>

        <div class="input-group">
            <label>Description</label>
            <textarea id="description"></textarea>
        </div>

        <div class="input-group">
            <label>Due Date</label>
            <input type="date" id="dueDate">
        </div>

        <div class="input-group">
            <label>Assignment File</label>
            <input type="text" id="file" placeholder="Example : assignments/html1.pdf">
        </div>

        <button onclick="saveAssignment()">
            Add Assignment
        </button>

    </div>

    <br><br>

    <h2 style="text-align:center">All Assignments</h2>

    <div id="assignmentContainer"></div>

    <script src="Assignments.js"></script>

</body>

</html>

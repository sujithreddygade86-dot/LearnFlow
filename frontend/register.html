<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnFlow Logo</title>


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="logo">
        <h1>Learn<span>Flow</span></h1>
        <div class="line"></div>
        <p>Learn continuously • Grow confidently</p>
    </div>

    <div class="login">

        <h2>Create Account</h2>

        <p class="subtitle">
            Join <span>LearnFlow</span> and begin your learning journey.
        </p>

        <form>

            <label for="FullName">Full Name</label>
            <input type="text" placeholder="Enter your Full Name" id="name">

            <label for="email">Email Address</label>
            <input type="email" placeholder="Enter your email" id="email">

            <label for="pass">Password</label>
            <input type="password" placeholder="Enter your password" id="pass">

            <label>Confirm Password</label>
            <input type="password" placeholder="Enter your password">

            <button type="button" onclick="registerUser()">Sign Up</button>

            <p class="signup">
                Already Have an Account?
                <a href="login.html">Sign Up</a>
            </p>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
